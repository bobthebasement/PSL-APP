container: {type: ColumnPanel}
properties:
  title: PSL - Photo Scoring League
  name: MainForm
  spacing_above: small
  spacing_below: small
  visible: true
  background: theme:Primary Container
  foreground: theme:On Primary Container
  role: null
  tooltip: null
  border: null
  enabled: true
  spacing: {left: 20, top: 20, right: 20, bottom: 20}
  auto_scroll: false

components:
- type: ColumnPanel
  properties:
    name: main_container
    role: null
    tooltip: null
    border: null
    enabled: true
    visible: true
    spacing_above: none
    spacing_below: none
    background: '#000000'
    foreground: '#FFD700'
    spacing: {left: 0, top: 0, right: 0, bottom: 0}
    col_spacing: medium
    col_widths: {}
    auto_scroll: false
  layout_properties: {grid_position: 'FYQYQH,WZJQZQ', full_width_row: true}
  components:
  - type: Label
    properties:
      name: title_label
      role: title
      tooltip: null
      border: null
      enabled: true
      visible: true
      text: PSL
      font: {family: 'Montserrat, sans-serif', size: 48, style: normal, variant: normal, weight: 900}
      font_size: null
      spacing_above: small
      spacing_below: small
      icon_align: left
      foreground: '#FFD700'
      background: '#000000'
      bold: true
      italic: false
      underline: false
      icon: null
    layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true}
    event_bindings: {}

  - type: Label
    properties:
      name: subtitle_label
      role: subtitle
      tooltip: null
      border: null
      enabled: true
      visible: true
      text: Photo Scoring League
      font: {family: 'Montserrat, sans-serif', size: 24, style: normal, variant: normal, weight: 300}
      font_size: null
      spacing_above: none
      spacing_below: large
      icon_align: left
      foreground: '#FFD700'
      background: '#000000'
      bold: false
      italic: false
      underline: false
      icon: null
    layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true}
    event_bindings: {}

  - type: Label
    properties:
      name: description_label
      role: body
      tooltip: null
      border: null
      enabled: true
      visible: true
      text: 'Upload your photo to get a comprehensive PSL rating. Our AI analyzes facial geometry, feature proportions, skin quality, and dimorphism to produce individual category scores and a weighted overall PSL score.'
      font: {family: 'Roboto, sans-serif', size: 16, style: normal, variant: normal, weight: 400}
      font_size: null
      spacing_above: none
      spacing_below: large
      icon_align: left
      foreground: '#CCCCCC'
      background: '#000000'
      bold: false
      italic: false
      underline: false
      icon: null
      wrap_on: mobile
    layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true}
    event_bindings: {}

  - type: ColumnPanel
    properties:
      name: upload_section
      role: card
      tooltip: null
      border: '2px solid #FFD700'
      enabled: true
      visible: true
      spacing_above: none
      spacing_below: large
      background: '#111111'
      foreground: '#FFD700'
      spacing: {left: 20, top: 20, right: 20, bottom: 20}
      col_spacing: medium
      col_widths: {}
      auto_scroll: false
    layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true, width: 600}
    components:
    - type: Label
      properties:
        name: upload_title
        role: headline
        tooltip: null
        border: null
        enabled: true
        visible: true
        text: Upload Your Photo
        font: {family: 'Montserrat, sans-serif', size: 20, style: normal, variant: normal, weight: 600}
        font_size: null
        spacing_above: none
        spacing_below: small
        icon_align: left
        foreground: '#FFD700'
        background: '#111111'
        bold: true
        italic: false
        underline: false
        icon: null
      layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true}
      event_bindings: {}

    - type: Label
      properties:
        name: upload_instructions
        role: body
        tooltip: null
        border: null
        enabled: true
        visible: true
        text: 'For best results, use a clear front-facing photo in good lighting. Avoid heavy filters.'
        font: {family: 'Roboto, sans-serif', size: 14, style: normal, variant: normal, weight: 400}
        font_size: null
        spacing_above: none
        spacing_below: medium
        icon_align: left
        foreground: '#CCCCCC'
        background: '#111111'
        bold: false
        italic: false
        underline: false
        icon: null
      layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true}
      event_bindings: {}

    - type: FileLoader
      properties:
        name: image_uploader
        role: null
        tooltip: null
        border: '1px dashed #FFD700'
        enabled: true
        visible: true
        spacing_above: none
        spacing_below: medium
        background: '#222222'
        foreground: '#FFD700'
        file_types: [image/jpeg, image/png, image/webp]
        multiple: false
        text: '📷 Click to Upload or Drag & Drop'
        font: {family: 'Roboto, sans-serif', size: 16, style: normal, variant: normal, weight: 400}
        icon: fa:upload
        show_file_names: true
        max_file_size: 10
        max_files: 1
      layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true}
      event_bindings: {change: image_uploader_change}

    - type: Button
      properties:
        name: analyze_button
        role: filled-button
        tooltip: null
        border: null
        enabled: false
        visible: true
        spacing_above: none
        spacing_below: none
        background: '#FFD700'
        foreground: '#000000'
        text: Analyze Photo
        font: {family: 'Montserrat, sans-serif', size: 16, style: normal, variant: normal, weight: 600}
        icon: fa:magic
        icon_align: left
        bold: true
        italic: false
        underline: false
      layout_properties: {grid_position: 'VZQYQH,WZJQZQ', full_width_row: true}
      event_bindings: {click: analyze_button_click}

    - type: ProgressBar
